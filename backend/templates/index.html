<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankShield AI | Intrusion Detection & Threat Intelligence for Banking IoT</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#030712',
                            card: 'rgba(17, 24, 39, 0.7)',
                            border: '#1f2937',
                            primary: '#0ea5e9', // Neon Blue
                            success: '#10b981', // Cyber Green
                            warning: '#f59e0b', // Yellow
                            danger: '#ef4444',  // Red
                            glow: '#00f2fe'
                        }
                    },
                    boxShadow: {
                        'neon-blue': '0 0 15px rgba(14, 165, 233, 0.4)',
                        'neon-green': '0 0 15px rgba(16, 185, 129, 0.4)',
                        'neon-red': '0 0 15px rgba(239, 68, 68, 0.4)'
                    }
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Glassmorphism scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #030712;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0ea5e9;
        }
        .glow-text-blue {
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.6);
        }
        .glow-text-green {
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
        }
        .glow-text-red {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
        }
        .radar-sweep {
            position: relative;
            overflow: hidden;
        }
        .radar-sweep::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: conic-gradient(from 0deg, rgba(14, 165, 233, 0.15) 0deg, rgba(14, 165, 233, 0) 90deg);
            animation: sweep 6s linear infinite;
            transform-origin: center;
            pointer-events: none;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // Navigation
            const [view, setView] = useState('landing'); // 'landing' | 'dashboard' | 'threat-intel'

            // Data State
            const [alerts, setAlerts] = useState([]);
            const [incidents, setIncidents] = useState([]);
            const [selectedIncident, setSelectedIncident] = useState(null);
            const [selectedAlert, setSelectedAlert] = useState(null);
            const [threatIntel, setThreatIntel] = useState(null);
            const [modelStats, setModelStats] = useState(null);
            const [activeTactic, setActiveTactic] = useState(null);
            
            // Simulation state
            const [simulating, setSimulating] = useState(false);
            
            // Copilot State
            const [copilotHistory, setCopilotHistory] = useState([]);
            const [copilotInput, setCopilotInput] = useState('');
            const [copilotLoading, setCopilotLoading] = useState(false);

            // Fetch main dashboard data
            const fetchData = async () => {
                try {
                    const [alertsRes, incidentsRes, intelRes, statsRes] = await Promise.all([
                        fetch('/api/v1/alerts?limit=100'),
                        fetch('/api/v1/incidents'),
                        fetch('/api/v1/threat-intel'),
                        fetch('/api/v1/model-stats')
                    ]);
                    
                    const alertsData = await alertsRes.json();
                    const incidentsData = await incidentsRes.json();
                    const intelData = await intelRes.json();
                    const statsData = await statsRes.json();

                    setAlerts(alertsData);
                    setIncidents(incidentsData);
                    setThreatIntel(intelData);
                    setModelStats(statsData);

                    // Set default selection
                    if (incidentsData.length > 0) {
                        const defaultInc = incidentsData[0];
                        setSelectedIncident(defaultInc);
                        if (defaultInc.alerts && defaultInc.alerts.length > 0) {
                            setSelectedAlert(defaultInc.alerts[0]);
                        }
                    }
                } catch (error) {
                    console.error("Error loading SOC data:", error);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            // Handle incident select
            const handleSelectIncident = (inc) => {
                setSelectedIncident(inc);
                if (inc.alerts && inc.alerts.length > 0) {
                    setSelectedAlert(inc.alerts[0]);
                }
                // Clear copilot chat history when changing incidents
                setCopilotHistory([
                    {
                        sender: 'copilot',
                        text: `Hi Analyst. I have initialized security context for Incident **${inc.id.slice(0, 8)}** targeting the **${inc.asset_type}** subnet. I can discuss its risk indicators, SHAP explanations, or mitigation playbooks. Ask me anything.`
                    }
                ]);
            };

            // Trigger attack simulation
            const handleSimulateAttack = async (type) => {
                setSimulating(true);
                try {
                    const response = await fetch('/api/v1/alerts/simulate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ attack_class: type })
                    });
                    const res = await response.json();
                    
                    // Reload data
                    await fetchData();
                    
                    // Highlight the new incident
                    if (res.injected_alert) {
                        // Find incident containing this alert
                        const newIncidents = await (await fetch('/api/v1/incidents')).json();
                        const matchedInc = newIncidents.find(inc => inc.alerts.some(a => a.id === res.injected_alert.id));
                        if (matchedInc) {
                            handleSelectIncident(matchedInc);
                        }
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setSimulating(false);
                }
            };

            // Ask Copilot
            const handleAskCopilot = async (preText = null) => {
                const queryText = preText || copilotInput;
                if (!queryText || !selectedIncident) return;
                
                if (!preText) setCopilotInput('');
                
                // Add query to history
                setCopilotHistory(prev => [...prev, { sender: 'user', text: queryText }]);
                setCopilotLoading(true);

                try {
                    const response = await fetch('/api/v1/copilot/ask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            incident_id: selectedIncident.id,
                            question: queryText
                        })
                    });
                    const res = await response.json();
                    setCopilotHistory(prev => [...prev, { sender: 'copilot', text: res.answer }]);
                } catch (err) {
                    console.error(err);
                    setCopilotHistory(prev => [...prev, { sender: 'copilot', text: "Error calling Copilot reasoning API." }]);
                } finally {
                    setCopilotLoading(false);
                }
            };

            // Help format copilot markdown-like blocks
            const formatCopilotResponse = (text) => {
                // Quick markdown table/bullet helper for UI presentation
                return text.split('\n').map((line, idx) => {
                    if (line.startsWith('### ')) {
                        return <h3 key={idx} className="text-cyber-primary font-semibold text-base mt-3 mb-1">{line.replace('### ', '')}</h3>;
                    }
                    if (line.startsWith('#### ')) {
                        return <h4 key={idx} className="text-gray-300 font-semibold text-sm mt-2 mb-1">{line.replace('#### ', '')}</h4>;
                    }
                    if (line.startsWith('- [ ] ')) {
                        return <div key={idx} className="flex items-start space-x-2 my-1 text-xs code-font text-cyber-glow"><input type="checkbox" readOnly className="mt-1" /> <span>{line.replace('- [ ] ', '')}</span></div>;
                    }
                    if (line.startsWith('- ')) {
                        return <div key={idx} className="list-disc pl-4 text-xs text-gray-300">{line}</div>;
                    }
                    if (line.startsWith('|')) {
                        // Table row
                        return <div key={idx} className="text-xs code-font text-gray-400 border-b border-cyber-border py-1 flex justify-between"><span>{line}</span></div>;
                    }
                    return <p key={idx} className="text-xs text-gray-400 mb-1 leading-relaxed">{line}</p>;
                });
            };

            // Metrics computations
            const activeThreatCount = incidents.filter(i => i.status !== 'Resolved').length;
            const criticalAlertCount = alerts.filter(a => a.severity === 'Critical').length;
            const zeroDayCount = alerts.filter(a => a.anomaly_score > 80 && a.attack_class === 'Normal').length; // flagged anomalies
            const avgRiskScore = incidents.length > 0 ? (incidents.reduce((sum, inc) => sum + parseFloat(inc.overall_risk_score), 0) / incidents.length).toFixed(1) : 0;

            // Render Lucide Icons
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, incidents, selectedIncident, copilotHistory]);

            if (view === 'landing') {
                return (
                    <div className="min-h-screen bg-cyber-bg flex flex-col justify-between relative overflow-hidden">
                        {/* Background mesh grid */}
                        <div className="absolute inset-0 bg-[radial-gradient(#1f2937_1px,transparent_1px)] [background-size:24px_24px] opacity-25"></div>
                        <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-sky-900/10 rounded-full blur-[120px] pointer-events-none"></div>

                        {/* Top Navbar */}
                        <header className="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center z-10">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 rounded bg-gradient-to-tr from-sky-500 to-emerald-500 flex items-center justify-center shadow-neon-blue">
                                    <i data-lucide="shield" className="text-white w-6 h-6"></i>
                                </div>
                                <div>
                                    <span className="text-xl font-bold tracking-wider text-white code-font">BANKSHIELD<span className="text-sky-500">AI</span></span>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2 text-xs code-font text-sky-400 bg-sky-950/40 border border-sky-900/40 px-3 py-1.5 rounded-full">
                                <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                                <span>Platform Live (Accuracy: 96.82%)</span>
                            </div>
                        </header>

                        {/* Hero Content */}
                        <main className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center z-10 flex-grow py-12">
                            <div className="lg:col-span-6 space-y-6">
                                <div className="inline-block bg-sky-950/30 border border-sky-800/40 px-3 py-1 rounded text-xs text-sky-400 font-semibold tracking-wider uppercase">
                                    Explainable AI Security
                                </div>
                                <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight text-white leading-none">
                                    AI-Powered Banking <br/>
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-emerald-400">Threat Intelligence</span>
                                </h1>
                                <p className="text-base text-gray-400 leading-relaxed max-w-lg">
                                    Detect, explain, prioritize, and neutralize cyber threats across banking IoT networks in real time. Backed by Random Forest Classifiers, Isolation Forest zero-day anomaly detectors, and SHAP explainability.
                                </p>
                                
                                <div className="flex flex-wrap gap-4 pt-2">
                                    <button 
                                        onClick={() => setView('dashboard')}
                                        className="px-8 py-4 bg-gradient-to-r from-sky-600 to-sky-500 hover:from-sky-500 hover:to-sky-400 rounded text-sm font-semibold tracking-wide shadow-neon-blue transition duration-200 flex items-center space-x-2 text-white"
                                    >
                                        <span>Launch Security Center</span>
                                        <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>

                            {/* Threat radar landing component */}
                            <div className="lg:col-span-6 flex justify-center items-center relative">
                                <div className="w-[380px] h-[380px] md:w-[450px] md:h-[450px] rounded-full border border-sky-950/60 flex items-center justify-center relative radar-sweep bg-slate-950/40 shadow-2xl backdrop-blur-sm">
                                    <div className="absolute inset-4 rounded-full border border-sky-900/30 flex items-center justify-center">
                                        <div className="absolute inset-16 rounded-full border border-sky-800/20 flex items-center justify-center">
                                            <div className="absolute inset-28 rounded-full border border-sky-800/10 flex items-center justify-center">
                                                <div className="w-8 h-8 rounded-full bg-sky-500/20 flex items-center justify-center">
                                                    <div className="w-3.5 h-3.5 rounded-full bg-sky-500 animate-ping"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    {/* Simulated Threat dots */}
                                    <div className="absolute top-1/4 left-1/3 w-3 h-3 rounded-full bg-red-500 animate-pulse shadow-neon-red"></div>
                                    <div className="absolute bottom-1/3 right-1/4 w-3.5 h-3.5 rounded-full bg-yellow-500 animate-pulse shadow-neon-green"></div>
                                    <div className="absolute top-1/2 right-1/3 w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>

                                    {/* Stats overlay */}
                                    <div className="absolute bottom-6 left-6 right-6 bg-slate-950/90 border border-cyber-border rounded px-4 py-3 text-xs code-font flex justify-between items-center backdrop-blur-md">
                                        <div>
                                            <span className="text-gray-500 block">LAST DETECTED</span>
                                            <span className="text-red-400 font-bold">ATM BACKDOOR ATTEMPT</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-gray-500 block">RISK SCORE</span>
                                            <span className="text-red-500 font-extrabold text-sm">88.5/100</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* Footer logos */}
                        <footer className="w-full border-t border-cyber-border/40 py-6 z-10">
                            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-xs text-gray-500 space-y-4 md:space-y-0">
                                <div>
                                    <span>BANKSHIELD AI platform for cybersecurity operations.</span>
                                </div>
                                <div className="flex space-x-6">
                                    <span>UNSW-NB15 Validated</span>
                                    <span>SHAP Explainable Layer</span>
                                    <span>Isolation Forest Zero-Day</span>
                                </div>
                            </div>
                        </footer>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-cyber-bg flex flex-col">
                    {/* Header */}
                    <header className="border-b border-cyber-border bg-slate-950/80 px-6 py-4 flex flex-col md:flex-row justify-between items-center z-10 sticky top-0 backdrop-blur-md">
                        <div className="flex items-center space-x-6 mb-4 md:mb-0">
                            <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('landing')}>
                                <div className="w-8 h-8 rounded bg-gradient-to-tr from-sky-500 to-emerald-500 flex items-center justify-center">
                                    <i data-lucide="shield" className="text-white w-5 h-5"></i>
                                </div>
                                <span className="font-bold text-lg text-white code-font">BANKSHIELD<span className="text-sky-500">AI</span></span>
                            </div>
                            
                            <nav className="flex space-x-1 bg-slate-900 border border-cyber-border rounded p-0.5 text-xs font-semibold">
                                <button 
                                    onClick={() => setView('dashboard')}
                                    className={`px-3 py-1.5 rounded transition ${view === 'dashboard' ? 'bg-sky-500/20 text-sky-400 border-b-2 border-sky-400' : 'text-gray-400 hover:text-gray-200'}`}
                                >
                                    SOC Dashboard
                                </button>
                                <button 
                                    onClick={() => setView('threat-intel')}
                                    className={`px-3 py-1.5 rounded transition ${view === 'threat-intel' ? 'bg-sky-500/20 text-sky-400 border-b-2 border-sky-400' : 'text-gray-400 hover:text-gray-200'}`}
                                >
                                    Threat Intel Center
                                </button>
                            </nav>
                        </div>

                        {/* Top Simulation Controllers */}
                        <div className="flex items-center space-x-3 text-xs">
                            <span className="text-gray-500 code-font">SIMULATE ATTACK:</span>
                            <div className="flex space-x-1.5">
                                <button 
                                    onClick={() => handleSimulateAttack('DoS')} 
                                    disabled={simulating}
                                    className="px-2.5 py-1.5 bg-red-950/40 hover:bg-red-900/40 border border-red-900/60 rounded font-semibold text-red-400 transition"
                                >
                                    DoS (ATM disruption)
                                </button>
                                <button 
                                    onClick={() => handleSimulateAttack('Worms')} 
                                    disabled={simulating}
                                    className="px-2.5 py-1.5 bg-amber-950/40 hover:bg-amber-900/40 border border-amber-900/60 rounded font-semibold text-amber-400 transition"
                                >
                                    Worm (Lateral spread)
                                </button>
                                <button 
                                    onClick={() => handleSimulateAttack('Backdoor')} 
                                    disabled={simulating}
                                    className="px-2.5 py-1.5 bg-orange-950/40 hover:bg-orange-900/40 border border-orange-900/60 rounded font-semibold text-orange-400 transition"
                                >
                                    Backdoor (CCTV)
                                </button>
                                <button 
                                    onClick={() => handleSimulateAttack('Exploits')} 
                                    disabled={simulating}
                                    className="px-2.5 py-1.5 bg-purple-950/40 hover:bg-purple-900/40 border border-purple-900/60 rounded font-semibold text-purple-400 transition"
                                >
                                    Exploit (SWIFT core)
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Threat Intel Sub-View */}
                    {view === 'threat-intel' ? (
                        <div className="flex-grow p-6 max-w-7xl mx-auto w-full space-y-6">
                            <div className="bg-slate-950 border border-cyber-border rounded-lg p-6">
                                <h2 className="text-xl font-bold text-white mb-2">Threat Intelligence Center</h2>
                                <p className="text-xs text-gray-400 mb-6">Aggregated Mitre tactics, vector evaluation, and publication-ready daily/weekly summaries.</p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {/* Top Dangerous Vectors */}
                                    <div className="bg-slate-900/50 border border-cyber-border rounded-lg p-4">
                                        <h3 className="text-sm font-semibold text-gray-300 mb-3 flex items-center"><i data-lucide="activity" className="w-4 h-4 text-sky-500 mr-2"></i> Most Dangerous Threat Classes</h3>
                                        <div className="space-y-2">
                                            {threatIntel?.dangerous_classes?.map((c, idx) => (
                                                <div key={idx} className="flex justify-between items-center text-xs code-font bg-slate-950/50 p-2.5 rounded border border-cyber-border">
                                                    <div>
                                                        <span className="text-white font-bold">{c.class}</span>
                                                        <span className="text-gray-500 ml-3 font-semibold">({c.count} instances)</span>
                                                    </div>
                                                    <span className={`px-2 py-0.5 rounded font-bold ${c.severity === 'Critical' ? 'bg-red-500/20 text-red-400' : 'bg-yellow-500/20 text-yellow-400'}`}>{c.avg_risk}/100 Risk</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Top Attack Sources */}
                                    <div className="bg-slate-900/50 border border-cyber-border rounded-lg p-4">
                                        <h3 className="text-sm font-semibold text-gray-300 mb-3 flex items-center"><i data-lucide="globe" className="w-4 h-4 text-emerald-500 mr-2"></i> Top Attack Sources</h3>
                                        <div className="space-y-2">
                                            {threatIntel?.top_sources?.map((s, idx) => (
                                                <div key={idx} className="flex justify-between items-center text-xs code-font bg-slate-950/50 p-2.5 rounded border border-cyber-border">
                                                    <span className="text-sky-400 font-bold">{s.ip}</span>
                                                    <span className="text-white">{s.count} alerts triggered</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Reports and Document Summaries */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-slate-950 border border-cyber-border rounded-lg p-6">
                                    <h3 className="text-sm font-semibold text-gray-300 mb-4 flex justify-between items-center">
                                        <span>Daily Threat Intelligence Briefing</span>
                                        <button 
                                            onClick={async () => {
                                                const res = await (await fetch('/api/v1/threat-intel/report/daily')).json();
                                                alert(res.report);
                                            }}
                                            className="text-xs text-sky-400 font-semibold border border-sky-900/40 px-2 py-1 rounded bg-sky-950/30 hover:bg-sky-900/30"
                                        >
                                            View Full Markdown
                                        </button>
                                    </h3>
                                    <div className="bg-slate-900/50 border border-cyber-border p-4 rounded text-xs code-font text-gray-400 h-64 overflow-y-auto whitespace-pre-wrap leading-relaxed">
                                        {threatIntel ? ThreatIntelligenceCenter_MockDaily(threatIntel) : 'Loading daily stats...'}
                                    </div>
                                </div>

                                <div className="bg-slate-950 border border-cyber-border rounded-lg p-6">
                                    <h3 className="text-sm font-semibold text-gray-300 mb-4 flex justify-between items-center">
                                        <span>Weekly Analytical Audit Summary</span>
                                        <button 
                                            onClick={async () => {
                                                const res = await (await fetch('/api/v1/threat-intel/report/weekly')).json();
                                                alert(res.report);
                                            }}
                                            className="text-xs text-sky-400 font-semibold border border-sky-900/40 px-2 py-1 rounded bg-sky-950/30 hover:bg-sky-900/30"
                                        >
                                            View Full Markdown
                                        </button>
                                    </h3>
                                    <div className="bg-slate-900/50 border border-cyber-border p-4 rounded text-xs code-font text-gray-400 h-64 overflow-y-auto whitespace-pre-wrap leading-relaxed">
                                        {threatIntel ? ThreatIntelligenceCenter_MockWeekly() : 'Loading weekly report...'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        /* Dashboard Grid Layout */
                        <div className="flex-grow p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-[1600px] mx-auto w-full">
                            
                            {/* KPI Banner - Top 12 columns */}
                            <div className="lg:col-span-12 grid grid-cols-2 md:grid-cols-6 gap-4">
                                <div className="bg-slate-950/80 border border-cyber-border rounded-lg p-4 flex flex-col justify-center">
                                    <span className="text-[10px] text-gray-500 font-semibold tracking-wider uppercase">Traffic Analyzed</span>
                                    <span className="text-lg font-bold text-white mt-1 code-font">{alerts.length * 45} flows</span>
                                </div>
                                <div className="bg-slate-950/80 border border-cyber-border rounded-lg p-4 flex flex-col justify-center relative">
                                    <span className="text-[10px] text-gray-500 font-semibold tracking-wider uppercase flex items-center">
                                        Active Threat Groups
                                        {activeThreatCount > 0 && <span className="ml-1.5 w-1.5 h-1.5 rounded-full bg-red-500 animate-ping"></span>}
                                    </span>
                                    <span className={`text-lg font-bold mt-1 code-font ${activeThreatCount > 0 ? 'text-red-400 glow-text-red' : 'text-gray-300'}`}>{activeThreatCount} groups</span>

            return `# BANKSHIELD AI - DAILY THREAT INTELLIGENCE SUMMARY
Generated at: 2026-06-19 12:00:00 UTC
Report Scope: Past 24 Hours
Total Intrusion Events Flagged: ${intel.total_alerts} events

During the last 24 hours, the BankShield AI platform analyzed network transactions crossing branch banking VLANs. The network remained overall stable; however, machine learning classifiers caught suspicious behaviors targeting ATM terminals and SWIFT gateways.

## Attacker Source Attribution
The top external and internal threat actor endpoints scanning or attacking the systems:
${intel.top_sources.map(s => `- Source IP: ${s.ip} | Event Count: ${s.count}`).join('\n')}
